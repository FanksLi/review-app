services:
  nginx:
    image: nginx:alpine
    container_name: review-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: review-backend
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/db:/app/db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: review-frontend
    expose:
      - "3000"
    environment:
      - PYTHON_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped